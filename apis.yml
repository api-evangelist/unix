        returns: 0 on success, -1 on error
      - name: tcdrain
        description: Wait until all output has been transmitted
        parameters:
          - fd
        returns: 0 on success, -1 on error
      - name: tcflush
        description: Discard terminal data that has not been read or transmitted
        parameters:
          - fd
