    operations:
      - name: fcntl (F_SETLK)
        description: Set or release an advisory file lock without blocking
        parameters:
          - fd
          - F_SETLK
          - flock
        returns: 0 on success, -1 on error
      - name: fcntl (F_SETLKW)
        description: Set an advisory file lock, blocking if necessary
